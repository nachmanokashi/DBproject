<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFlow - Hospital Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // יצירת קומפוננטת אייקונים פשוטה שתואמת לקוד שלך
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const MediFlowApp = () => {
            const [activeTab, setActiveTab] = useState('dashboard');

            // Sidebar
            const Sidebar = () => (
                <div className="w-64 bg-slate-900 h-screen text-white fixed left-0 top-0 p-4">
                    <div className="flex items-center gap-2 mb-10 px-2">
                        <div className="bg-blue-600 p-2 rounded-lg text-white flex items-center justify-center">
                            <Icon name="activity" size={24} />
                        </div>
                        <h1 className="text-xl font-bold tracking-tight">MediFlow</h1>
                    </div>
                    <nav className="space-y-2">
                        {[
                            { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                            { id: 'patients', label: 'Patient Management', icon: 'users' },
                            { id: 'vitals', label: 'Vitals Tracker', icon: 'activity' },
                            { id: 'treatments', label: 'Treatments', icon: 'pill' },
                        ].map((item) => (
                            <button
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${
                                    activeTab === item.id ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'
                                }`}
                            >
                                <Icon name={item.icon} size={20} />
                                <span className="font-medium">{item.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );

            // 1. Dashboard
            const Dashboard = () => (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <p className="text-slate-500 text-sm font-medium">Hospital Occupancy</p>
                            <div className="flex items-end justify-between mt-2">
                                <h3 className="text-3xl font-bold text-slate-800">84%</h3>
                                <span className="text-green-500 text-sm font-medium">+2% vs last week</span>
                            </div>
                            <div className="w-full bg-slate-100 h-2 rounded-full mt-4">
                                <div className="bg-blue-600 h-2 rounded-full w-[84%]"></div>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <p className="text-slate-500 text-sm font-medium">Active Doctors</p>
                            <h3 className="text-3xl font-bold text-slate-800 mt-2">42</h3>
                            <p className="text-slate-400 text-xs mt-2">12 Specialists currently on call</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <p className="text-slate-500 text-sm font-medium">Today's Admissions</p>
                            <h3 className="text-3xl font-bold text-slate-800 mt-2">18</h3>
                            <div className="flex gap-2 mt-2">
                                <span className="px-2 py-1 bg-orange-100 text-orange-600 text-xs rounded-md">5 Emergency</span>
                                <span className="px-2 py-1 bg-blue-100 text-blue-600 text-xs rounded-md">13 Scheduled</span>
                            </div>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <h3 className="font-bold text-slate-800 mb-4">Department Load</h3>
                        <div className="space-y-4">
                            {['Emergency', 'Cardiology', 'Pediatrics'].map((dept) => (
                                <div key={dept} className="flex items-center justify-between">
                                    <span className="text-slate-600">{dept}</span>
                                    <div className="flex items-center gap-4">
                                        <div className="w-48 bg-slate-100 h-2 rounded-full">
                                            <div className={`h-2 rounded-full ${dept === 'Emergency' ? 'bg-red-500 w-4/5' : 'bg-blue-500 w-1/2'}`}></div>
                                        </div>
                                        <span className="text-sm font-bold">{dept === 'Emergency' ? 'High' : 'Normal'}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            // 2. Patient Management
            const PatientManagement = () => (
                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden animate-in fade-in">
                    <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                        <div className="relative w-96">
                            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={18} /></div>
                            <input type="text" placeholder="Search patients..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none" />
                        </div>
                        <button className="bg-blue-600 text-white px-4 py-2 rounded-xl flex items-center gap-2">
                            <Icon name="plus" size={18} /> Add Patient
                        </button>
                    </div>
                    <table className="w-full text-left">
                        <thead className="bg-slate-50 text-slate-500 text-sm">
                            <tr>
                                <th className="px-6 py-4">ID</th>
                                <th className="px-6 py-4">Full Name</th>
                                <th className="px-6 py-4">Birth Date</th>
                                <th className="px-6 py-4">Status</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {[
                                { id: 'P-1001', name: 'Johnathan Doe', dob: '1985-05-12', status: 'Inpatient' },
                                { id: 'P-1002', name: 'Sarah Williams', dob: '1992-11-30', status: 'Outpatient' },
                                { id: 'P-1003', name: 'Robert Chen', dob: '1970-02-15', status: 'Inpatient' },
                            ].map((p) => (
                                <tr key={p.id} className="hover:bg-slate-50">
                                    <td className="px-6 py-4 font-mono text-blue-600">{p.id}</td>
                                    <td className="px-6 py-4 font-medium">{p.name}</td>
                                    <td className="px-6 py-4">{p.dob}</td>
                                    <td className="px-6 py-4">
                                        <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs">{p.status}</span>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );

            // 3. Vitals Tracker
            const VitalsTracker = () => (
                <div className="space-y-4 animate-in fade-in">
                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <div className="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                        Live Telemetry Log (20,000+ Records Capability)
                    </h2>
                    <div className="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
                        <div className="max-h-[500px] overflow-y-auto font-mono text-xs text-slate-300 p-4">
                            <table className="w-full">
                                <thead className="text-slate-500 border-b border-slate-800">
                                    <tr>
                                        <th className="pb-2 text-left">Timestamp</th>
                                        <th className="pb-2 text-left">Patient</th>
                                        <th className="pb-2 text-left">Heart Rate</th>
                                        <th className="pb-2 text-left">Temp</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {[...Array(15)].map((_, i) => (
                                        <tr key={i} className="border-b border-slate-800/50">
                                            <td className="py-2 text-slate-500">2026-03-22 12:44:{i}</td>
                                            <td className="py-2 text-blue-400">P-100{i%5}</td>
                                            <td className="py-2 text-green-400">{72+i} BPM</td>
                                            <td className="py-2">36.6°C</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            // 4. Treatments
            const Treatments = () => (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in">
                    <div className="lg:col-span-1 bg-white p-6 rounded-2xl border border-slate-200">
                        <h3 className="font-bold mb-4">Assign Treatment</h3>
                        <div className="space-y-4">
                            <input className="w-full p-2 bg-slate-50 border rounded-lg" placeholder="Patient ID" />
                            <input className="w-full p-2 bg-slate-50 border rounded-lg" placeholder="Medication" />
                            <button className="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Submit</button>
                        </div>
                    </div>
                    <div className="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200">
                        <h3 className="font-bold mb-4">Active Medications</h3>
                        <div className="space-y-3">
                            {['Amoxicillin', 'Lisinopril', 'Metformin'].map(m => (
                                <div key={m} className="p-4 border rounded-xl flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <Icon name="pill" className="text-blue-500" />
                                        <span className="font-bold">{m}</span>
                                    </div>
                                    <span className="text-sm text-slate-500">Daily Dosage: 500mg</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 flex">
                    <Sidebar />
                    <main className="flex-1 ml-64 p-8">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800 capitalize">{activeTab}</h2>
                                <p className="text-slate-500">MediFlow Hospital Systems</p>
                            </div>
                            <div className="flex items-center gap-4 text-slate-400">
                                <Icon name="bell" />
                                <div className="w-10 h-10 bg-slate-200 rounded-full"></div>
                            </div>
                        </header>
                        {activeTab === 'dashboard' && <Dashboard />}
                        {activeTab === 'patients' && <PatientManagement />}
                        {activeTab === 'vitals' && <VitalsTracker />}
                        {activeTab === 'treatments' && <Treatments />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MediFlowApp />);
    </script>
</body>
</html>
